<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota Online — Вход по Логину</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --dota-red: #a32222;
            --dota-gold: #c3a067;
            --dota-bg: #0b0e11;
            --dota-panel: #1c2024;
            --dota-border: #3d444b;
            --online: #00ff00;
        }

        body {
            background: #000 url('https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/backgrounds/grey_texture.png');
            color: #e1e1e1; font-family: 'Inter', sans-serif; height: 100vh; margin: 0; overflow: hidden;
        }

        .hidden { display: none !important; }
        .dota-font { font-family: 'Cinzel', serif; }

        /* --- Auth Card --- */
        .auth-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .dota-card {
            background: var(--dota-panel); border: 1px solid var(--dota-border);
            padding: 30px; width: 350px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .dota-card h2 { text-align: center; margin-bottom: 20px; color: var(--dota-gold); }

        input {
            width: 100%; padding: 12px; background: #000; border: 1px solid var(--dota-border);
            color: white; margin-bottom: 12px; outline: none; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--dota-gold); }

        .btn-dota {
            background: linear-gradient(to bottom, #4d555d, #2b3136);
            border: 1px solid #6c757d; color: white; padding: 12px;
            cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase;
        }
        .btn-dota:hover { border-color: var(--dota-gold); background: #3d444b; }

        /* --- UI Elements --- */
        .navbar {
            height: 70px; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--dota-border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 30px;
        }
        .profile-trigger { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar-frame { width: 45px; height: 45px; border: 1px solid var(--dota-gold); position: relative; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }

        .main-container { padding: 30px; display: grid; grid-template-columns: 320px 1fr; gap: 30px; }
        .friends-panel { background: rgba(20,24,28,0.8); border: 1px solid var(--dota-border); padding: 20px; height: 70vh; overflow-y: auto; }
        
        .friend-item {
            display: flex; align-items: center; gap: 10px; padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .friend-item:hover { background: rgba(255,255,255,0.05); }

        .play-box { position: fixed; bottom: 30px; right: 30px; }
        .play-btn {
            background: linear-gradient(135deg, #448a2e, #214d14);
            color: white; padding: 15px 50px; font-size: 24px; border: 1px solid #6fb853;
            cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 500; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА И РЕГИСТРАЦИИ -->
    <div id="auth-screen" class="auth-overlay">
        <div class="dota-card">
            <h2 id="auth-title" class="dota-font">Вход</h2>
            
            <input type="text" id="auth-login" placeholder="Логин">
            <input type="password" id="auth-password" placeholder="Пароль">
            
            <!-- Поле подтверждения пароля (только для регистрации) -->
            <div id="confirm-box" class="hidden">
                <input type="password" id="auth-confirm" placeholder="Повторите пароль">
            </div>

            <button class="btn-dota" onclick="handleAuth()" id="auth-btn">Войти</button>
            
            <p id="toggle-text" onclick="toggleReg()" style="font-size: 11px; margin-top: 15px; cursor:pointer; color: var(--dota-gold); text-align: center;">
                НЕТ АККАУНТА? СОЗДАТЬ
            </p>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="app" class="hidden">
        <nav class="navbar">
            <div class="profile-trigger" onclick="openProfile(currentUser.id, true)">
                <div class="avatar-frame"><img src="" id="nav-avatar"></div>
                <div>
                    <div id="nav-login" class="dota-font" style="color: var(--dota-gold);">LOGIN</div>
                    <div id="nav-id" style="font-size: 10px; color: #888;">ID: 000000</div>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="showNotifications()" class="btn-dota" style="width: auto; padding: 5px 15px;">
                    <i class="fas fa-bell"></i> <span id="notif-count">0</span>
                </button>
                <button onclick="logout()" class="btn-dota" style="width: auto; padding: 5px 15px; background: #333;">Выход</button>
            </div>
        </nav>

        <div class="main-container">
            <div class="friends-panel">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span class="dota-font">ДРУЗЬЯ</span>
                    <i class="fas fa-user-plus" style="cursor:pointer; color: var(--dota-gold);" onclick="showAddFriend()"></i>
                </div>
                <div id="friends-list"></div>
            </div>
        </div>

        <div class="play-box">
            <button class="play-btn dota-font">ИГРАТЬ</button>
        </div>
    </div>

    <!-- Модалки (профиль, уведомления) -->
    <div id="profile-modal" class="modal hidden">
        <div class="dota-card" style="width: 400px; text-align: center;">
            <div class="avatar-frame" style="width: 80px; height: 80px; margin: 0 auto;" onclick="showAvatarGrid()">
                <img src="" id="prof-avatar">
            </div>
            <h3 id="prof-login" class="dota-font"></h3>
            <textarea id="prof-desc" placeholder="О себе..."></textarea>
            <button class="btn-dota" onclick="saveDescription()">Сохранить</button>
            <button class="btn-dota" style="margin-top:5px; background:#222;" onclick="closeModals()">Закрыть</button>
        </div>
    </div>

    <div id="notif-modal" class="modal hidden">
        <div class="dota-card">
            <h3 class="dota-font">Уведомления</h3>
            <div id="notif-list"></div>
            <button class="btn-dota" onclick="closeModals()">Закрыть</button>
        </div>
    </div>

    <script>
        // КОНФИГУРАЦИЯ SUPABASE
        const SB_URL = "ВАШ_SUPABASE_URL";
        const SB_KEY = "ВАШ_SUPABASE_ANON_KEY";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let isReg = false;

        // Переключение Вход / Регистрация
        function toggleReg() {
            isReg = !isReg;
            document.getElementById('auth-title').innerText = isReg ? 'Регистрация' : 'Вход';
            document.getElementById('auth-btn').innerText = isReg ? 'Создать аккаунт' : 'Войти';
            document.getElementById('confirm-box').classList.toggle('hidden', !isReg);
            document.getElementById('toggle-text').innerText = isReg ? 'УЖЕ ЕСТЬ АККАУНТ? ВОЙТИ' : 'НЕТ АККАУНТА? СОЗДАТЬ';
        }

        // Обработка Входа и Регистрации
        async function handleAuth() {
            const login = document.getElementById('auth-login').value.trim();
            const pass = document.getElementById('auth-password').value;
            const confirmPass = document.getElementById('auth-confirm').value;

            if (login.length < 3) return alert("Логин слишком короткий");
            if (pass.length < 6) return alert("Пароль должен быть от 6 символов");

            // Создаем виртуальный email из логина
            const virtualEmail = `${login}@dota.local`;

            if (isReg) {
                // РЕГИСТРАЦИЯ
                if (pass !== confirmPass) return alert("Пароли не совпадают!");

                const { data, error } = await supabase.auth.signUp({
                    email: virtualEmail,
                    password: pass
                });

                if (error) return alert("Ошибка: " + error.message);

                // Создаем профиль в таблице profiles
                const displayId = Math.floor(100000 + Math.random() * 899999);
                const { error: pError } = await supabase.from('profiles').insert([
                    { 
                        id: data.user.id, 
                        login: login, 
                        display_id: displayId, 
                        avatar_url: "https://avatars.mds.yandex.net/i?id=9daa48affce7cf03b7b75863f56075a279504a68-10254792-images-thumbs&n=13" 
                    }
                ]);

                if (pError) console.error(pError);
                alert("Аккаунт создан! Теперь войдите.");
                toggleReg();
            } else {
                // ВХОД
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: virtualEmail,
                    password: pass
                });

                if (error) return alert("Неверный логин или пароль");
                initApp();
            }
        }

        async function initApp() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                currentUser = profile;
                
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                
                updateUI();
                refreshData();
                startHeartbeat();
                setupRealtime();
            }
        }

        function updateUI() {
            document.getElementById('nav-avatar').src = currentUser.avatar_url;
            document.getElementById('nav-login').innerText = currentUser.login.toUpperCase();
            document.getElementById('nav-id').innerText = "ID: " + currentUser.display_id;
        }

        async function refreshData() {
            // Загрузка друзей
            const { data: f1 } = await supabase.from('friendships').select('receiver_id, profiles!friendships_receiver_id_fkey(*)').eq('sender_id', currentUser.id).eq('status', 'accepted');
            const { data: f2 } = await supabase.from('friendships').select('sender_id, profiles!friendships_sender_id_fkey(*)').eq('receiver_id', currentUser.id).eq('status', 'accepted');
            
            const list = document.getElementById('friends-list');
            list.innerHTML = '';
            const allFriends = [...(f1?.map(x=>x.profiles) || []), ...(f2?.map(x=>x.profiles) || [])];
            
            allFriends.forEach(f => {
                const isOnline = (new Date() - new Date(f.last_seen)) < 60000;
                list.innerHTML += `
                    <div class="friend-item" onclick="openProfile('${f.id}')">
                        <div class="avatar-frame" style="width:30px; height:30px; border-color:${isOnline ? 'var(--online)' : '#555'}">
                            <img src="${f.avatar_url}">
                        </div>
                        <span style="color:${isOnline ? '#fff' : '#888'}">${f.login}</span>
                    </div>
                `;
            });

            // Заявки
            const { data: reqs } = await supabase.from('friendships').select('id, profiles!friendships_sender_id_fkey(*)').eq('receiver_id', currentUser.id).eq('status', 'pending');
            document.getElementById('notif-count').innerText = reqs?.length || 0;
            window.pendingRequests = reqs || [];
        }

        function setupRealtime() {
            supabase.channel('global').on('postgres_changes', { event: '*', schema: 'public', table: 'friendships' }, () => refreshData()).subscribe();
        }

        function startHeartbeat() {
            setInterval(() => {
                supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id).then();
            }, 30000);
        }

        async function showAddFriend() {
            const id = prompt("Введите ID игрока:");
            if (!id) return;
            const { data: target } = await supabase.from('profiles').select('id').eq('display_id', id).single();
            if (target) {
                await supabase.from('friendships').insert([{ sender_id: currentUser.id, receiver_id: target.id }]);
                alert("Заявка отправлена!");
            } else alert("Игрок не найден");
        }

        function logout() {
            supabase.auth.signOut().then(() => location.reload());
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); }

        // Проверка сессии при загрузке
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) initApp();
        });
    </script>
</body>
</html>
