<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota Online — Realtime Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dota-red: #a32222; --dota-gold: #c3a067; --dota-panel: #1c2024; --dota-border: #3d444b; }
        body { background: #000 url('https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/backgrounds/grey_texture.png'); color: #e1e1e1; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hidden { display: none !important; }
        .dota-card { background: var(--dota-panel); border: 1px solid var(--dota-border); padding: 30px; width: 350px; box-shadow: 0 0 30px rgba(0,0,0,0.5); text-align: center; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--dota-border); color: white; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--dota-gold); }
        .btn-dota { background: linear-gradient(to bottom, #4d555d, #2b3136); border: 1px solid #6c757d; color: white; padding: 12px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .btn-dota:hover { border-color: var(--dota-gold); }
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; box-sizing: border-box; border-bottom: 1px solid var(--dota-border); }
        .avatar-frame { width: 40px; height: 40px; border: 1px solid var(--dota-gold); overflow: hidden; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen">
        <div class="dota-card">
            <h2 id="auth-title" style="font-family: 'Cinzel'; color: var(--dota-gold);">Вход</h2>
            <input type="text" id="login" placeholder="Логин">
            <input type="password" id="pass" placeholder="Пароль">
            <div id="reg-box" class="hidden">
                <input type="password" id="pass_confirm" placeholder="Повторите пароль">
            </div>
            <button class="btn-dota" id="main-btn" onclick="handleAuth()">Войти</button>
            <p id="toggle-link" style="font-size: 11px; cursor: pointer; color: var(--dota-gold);" onclick="toggleMode()">НЕТ АККАУНТА? СОЗДАТЬ</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="app" class="hidden">
        <nav class="navbar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="avatar-frame"><img id="user-avatar" src=""></div>
                <div>
                    <div id="user-login" style="font-family: 'Cinzel'; color: var(--dota-gold);">NAME</div>
                    <div id="user-id" style="font-size: 10px; color: #888;">ID: 000000</div>
                </div>
            </div>
            <button class="btn-dota" style="width: auto; padding: 5px 20px;" onclick="logout()">Выйти</button>
        </nav>
        <div style="text-align: center;">
            <h1 style="font-family: 'Cinzel'; font-size: 40px; opacity: 0.5;">СЕТЬ ПОДКЛЮЧЕНА</h1>
            <p>Вы вошли как <span id="display-name"></span></p>
        </div>
    </div>

    <script>
        // ДАННЫЕ SUPABASE (ВСТАВЬ СВОИ)
        const SB_URL = "ВАШ_URL";
        const SB_KEY = "ВАШ_KEY";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let isRegistration = false;

        function toggleMode() {
            isRegistration = !isRegistration;
            document.getElementById('auth-title').innerText = isRegistration ? 'Регистрация' : 'Вход';
            document.getElementById('main-btn').innerText = isRegistration ? 'Создать' : 'Войти';
            document.getElementById('reg-box').classList.toggle('hidden', !isRegistration);
            document.getElementById('toggle-link').innerText = isRegistration ? 'ЕСТЬ АККАУНТ? ВОЙТИ' : 'НЕТ АККАУНТА? СОЗДАТЬ';
        }

        async function handleAuth() {
            const login = document.getElementById('login').value.trim();
            const pass = document.getElementById('pass').value;
            const confirm = document.getElementById('pass_confirm').value;

            if (!login || !pass) return alert("Заполните поля!");

            // Используем виртуальную почту для Supabase Auth
            const email = `${login}@dota.app`;

            if (isRegistration) {
                if (pass !== confirm) return alert("Пароли не совпадают!");
                
                // 1. Регистрация в Auth
                const { data, error } = await supabase.auth.signUp({ email, password: pass });
                
                if (error) {
                    alert("Ошибка регистрации: " + error.message);
                    return;
                }

                // 2. Создание записи в таблице profiles
                const displayId = Math.floor(100000 + Math.random() * 899999);
                const { error: profileError } = await supabase.from('profiles').insert([
                    { 
                        id: data.user.id, 
                        login: login, 
                        display_id: displayId,
                        avatar_url: "https://avatars.mds.yandex.net/i?id=9daa48affce7cf03b7b75863f56075a279504a68-10254792-images-thumbs&n=13"
                    }
                ]);

                if (profileError) {
                    console.error("Profile error:", profileError);
                    alert("Аккаунт создан, но профиль не заполнился.");
                } else {
                    alert("Аккаунт успешно создан! Теперь войдите.");
                    toggleMode();
                }

            } else {
                // ВХОД
                const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
                
                if (error) {
                    alert("Ошибка входа: " + error.message);
                } else {
                    checkUser();
                }
            }
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                if (profile) {
                    showApp(profile);
                }
            }
        }

        function showApp(profile) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-login').innerText = profile.login.toUpperCase();
            document.getElementById('display-name').innerText = profile.login;
            document.getElementById('user-id').innerText = "ID: " + profile.display_id;
            document.getElementById('user-avatar').src = profile.avatar_url;
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        // Проверяем сессию при загрузке страницы
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) checkUser();
        });
    </script>
</body>
</html>
